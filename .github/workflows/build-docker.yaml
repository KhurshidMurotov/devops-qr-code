name: Build and Publish image to Docker Hub

on:
  workflow_dispatch: # Запуск кнопкой в GitHub Actions

jobs:
  publish_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: khurshidmurotov
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build images
        run: |
          # Собираем API
          docker build -f api/Dockerfile -t khurshidmurotov/qr-generator-api:latest ./api
          # Собираем Frontend (исправлено имя пользователя)
          docker build -f front-end-nextjs/Dockerfile -t khurshidmurotov/qr-generator-frontend:latest ./front-end-nextjs

      - name: Check images
        run: docker images

      - name: Push images
        run: |
          docker push khurshidmurotov/qr-generator-api:latest
          docker push khurshidmurotov/qr-generator-frontend:latest